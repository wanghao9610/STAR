<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1330 1000" width="1330" height="1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>STAR research workflow — eleven skills in order, one that reads them all, and what each one writes</title>

  <!-- Arrowheads are explicit triangles, not <marker> elements: several SVG
       rasterisers (macOS sips among them) silently drop markers, which would
       strip every arrow direction out of an exported PNG. -->
  <defs>
    <style>
      .nt { font-family: Menlo, ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 14.5px; font-weight: 600; fill: #1e293b; }
      .np { font-size: 11.5px; fill: #475569; }
      .no { font-family: Menlo, ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 10.5px; fill: #64748b; }
      .bn { font-family: Menlo, ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
      .tag { font-size: 9px; fill: #64748b; text-anchor: middle; }
      .el { font-size: 10px; fill: #64748b; }
      .elc { font-size: 9.5px; fill: #64748b; text-anchor: middle; }
      .lv { font-size: 9.5px; fill: #7048e8; }
      .lvc { font-size: 9.5px; fill: #7048e8; text-anchor: middle; }
      .spine { fill: none; stroke: #64748b; stroke-width: 1.8; stroke-linejoin: round; }
      .loop { fill: none; stroke: #7048e8; stroke-width: 1.6; stroke-dasharray: 6 4; stroke-linejoin: round; }
      .stub { fill: none; stroke: #7048e8; stroke-width: 1.6; stroke-dasharray: 6 4; }
      .ah { fill: #64748b; }
      .ahv { fill: #7048e8; }
      .jn { font-family: Menlo, ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 11px; font-weight: 700; fill: #7048e8; text-anchor: middle; }
    </style>
  </defs>

  <rect x="0" y="0" width="1330" height="1000" fill="#ffffff"/>

  <!-- title -->
  <text x="60" y="52" font-size="21" font-weight="700" fill="#0f172a">STAR research workflow</text>
  <text x="60" y="76" font-size="12" fill="#64748b">Twelve skills · eleven in order and one that reads them all · what each one writes · how the loop closes</text>

  <!-- ============ NODES ============ -->

  <!-- 1 idea-storm (PLAN) -->
  <rect x="60" y="100" width="340" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="88" cy="126" r="13" fill="#4c6ef5"/>
  <text class="bn" x="88" y="130.5">1</text>
  <text class="nt" x="110" y="131">$star-idea-storm</text>
  <text class="np" x="78" y="156">A vague interest → a defensible topic</text>
  <text class="no" x="78" y="178">metds/ideas/&lt;slug&gt;_idea.md</text>

  <!-- 2 plan-coach (PLAN) -->
  <rect x="60" y="224" width="340" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="88" cy="250" r="13" fill="#4c6ef5"/>
  <text class="bn" x="88" y="254.5">2</text>
  <text class="nt" x="110" y="255">$star-plan-coach</text>
  <text class="np" x="78" y="280">An idea → a plan, one question at a time</text>
  <text class="no" x="78" y="302">metds/plans/&lt;n&gt;_&lt;topic&gt;_plan.md</text>

  <!-- 3 refs-reviewer (PLAN) -->
  <rect x="60" y="348" width="340" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="88" cy="374" r="13" fill="#4c6ef5"/>
  <text class="bn" x="88" y="378.5">3</text>
  <text class="nt" x="110" y="379">$star-refs-reviewer</text>
  <text class="np" x="78" y="404">The closest work, transcribed from fetched records</text>
  <text class="no" x="78" y="426">metds/refs/*.md · reference.bib · refs_index.md</text>

  <!-- 4 code-architect (CODE) -->
  <rect x="60" y="472" width="340" height="92" rx="10" fill="#fff4e6" stroke="#fed7aa" stroke-width="1.5"/>
  <circle cx="88" cy="498" r="13" fill="#f76707"/>
  <text class="bn" x="88" y="502.5">4</text>
  <text class="nt" x="110" y="503">$star-code-architect</text>
  <rect x="304" y="484" width="84" height="18" rx="9" fill="#ffffff" stroke="#fed7aa"/>
  <text class="tag" x="346" y="496.5">first run only</text>
  <text class="np" x="78" y="528">A code home for the plan, architecture recorded</text>
  <text class="no" x="78" y="550">${CODE_NAME}/ · UPSTREAM.md · metds/codearc.md</text>

  <!-- 5 env-builder (CODE) -->
  <rect x="60" y="596" width="340" height="92" rx="10" fill="#fff4e6" stroke="#fed7aa" stroke-width="1.5"/>
  <circle cx="88" cy="622" r="13" fill="#f76707"/>
  <text class="bn" x="88" y="626.5">5</text>
  <text class="nt" x="110" y="627">$star-env-builder</text>
  <rect x="304" y="608" width="84" height="18" rx="9" fill="#ffffff" stroke="#fed7aa"/>
  <text class="tag" x="346" y="620.5">first run only</text>
  <text class="np" x="78" y="652">The runtime built from .env and smoke-verified</text>
  <text class="no" x="78" y="674">wkdrs/env_*/ENV_REPORT.md · freeze.txt</text>

  <!-- 6 plan-decomposer (PLAN) -->
  <rect x="60" y="720" width="340" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="88" cy="746" r="13" fill="#4c6ef5"/>
  <text class="bn" x="88" y="750.5">6</text>
  <text class="nt" x="110" y="751">$star-plan-decomposer</text>
  <text class="np" x="78" y="776">The plan split into verifiable leaf sub-plans</text>
  <text class="no" x="78" y="798">metds/plans/&lt;prefix&gt;_&lt;task&gt;_plan.md</text>

  <!-- flow-status (AUDIT) — deliberately unnumbered: it is not a stage in the
       order, it reads every stage and can be run at any point. The ring is
       drawn as nested circles rather than a ◎ glyph, which rasterisers may
       not have in the monospace stack. -->
  <rect x="520" y="100" width="340" height="92" rx="10" fill="#e6fcf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <circle cx="548" cy="126" r="13" fill="#0ca678"/>
  <circle cx="548" cy="126" r="7.5" fill="#e6fcf5"/>
  <circle cx="548" cy="126" r="3.5" fill="#0ca678"/>
  <text class="nt" x="570" y="131">$star-flow-status</text>
  <rect x="772" y="112" width="72" height="18" rx="9" fill="#ffffff" stroke="#a7f3d0"/>
  <text class="tag" x="808" y="124.5">any time</text>
  <text class="np" x="538" y="156">The flow read; what is owed and the one next action</text>
  <text class="no" x="538" y="178">read-only — writes nothing</text>

  <!-- 7 plan-executor (CODE) -->
  <rect x="960" y="100" width="340" height="92" rx="10" fill="#fff4e6" stroke="#fed7aa" stroke-width="1.5"/>
  <circle cx="988" cy="126" r="13" fill="#f76707"/>
  <text class="bn" x="988" y="130.5">7</text>
  <text class="nt" x="1010" y="131">$star-plan-executor</text>
  <text class="np" x="968" y="156">One leaf implemented and verified</text>
  <text class="no" x="968" y="178">wkdrs/&lt;run&gt;/EXEC_PLAN.md · EXEC_LOG.md</text>

  <!-- 8 code-reviewer (AUDIT) -->
  <rect x="960" y="410" width="340" height="92" rx="10" fill="#e6fcf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <circle cx="988" cy="436" r="13" fill="#0ca678"/>
  <text class="bn" x="988" y="440.5">8</text>
  <text class="nt" x="1010" y="441">$star-code-reviewer</text>
  <text class="np" x="968" y="466">Code audited against conventions and the plan</text>
  <text class="no" x="968" y="488">wkdrs/&lt;run&gt;/CODE_REVIEW_&lt;date&gt;.md</text>

  <!-- 9 expt-analyst (AUDIT) -->
  <rect x="960" y="720" width="340" height="92" rx="10" fill="#e6fcf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <circle cx="988" cy="746" r="13" fill="#0ca678"/>
  <text class="bn" x="988" y="750.5">9</text>
  <text class="nt" x="1010" y="751">$star-expt-analyst</text>
  <text class="np" x="968" y="776">The run scored against the plan’s done-criteria</text>
  <text class="no" x="968" y="798">wkdrs/&lt;run&gt;/EXPT_ANALYSIS_&lt;date&gt;.md · analysis/</text>

  <!-- 10 plan-reviser (PLAN) -->
  <rect x="520" y="720" width="340" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="548" cy="746" r="13" fill="#4c6ef5"/>
  <text class="bn" x="548" y="750.5">10</text>
  <text class="nt" x="570" y="751">$star-plan-reviser</text>
  <text class="np" x="538" y="776">Execution evidence folded back into the plan</text>
  <text class="no" x="538" y="798">wkdrs/&lt;run&gt;/REVIEW_&lt;date&gt;.md · plan revised</text>

  <!-- 11 metd-summarize (PLAN) -->
  <rect x="60" y="888" width="400" height="92" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="88" cy="914" r="13" fill="#4c6ef5"/>
  <text class="bn" x="88" y="918.5">11</text>
  <text class="nt" x="110" y="919">$star-metd-summarize</text>
  <rect x="376" y="900" width="72" height="18" rx="9" fill="#ffffff" stroke="#c7d2fe"/>
  <text class="tag" x="412" y="912.5">plans only</text>
  <text class="np" x="78" y="944">The matured plan tree compiled into method docs</text>
  <text class="no" x="78" y="966">metds/{overview,dataset,framework,training,evaluation}.md</text>

  <!-- ============ SPINE EDGES ============ -->

  <!-- 1 -> 2 : the framed topic -->
  <path class="spine" d="M230,192 L230,220"/>
  <path class="ah" d="M230,220 L225.5,211 L234.5,211 Z"/>
  <text class="el" x="248" y="210">the framed topic</text>

  <!-- 2 <-> 3 interleave -->
  <path class="spine" d="M190,316 L190,344"/>
  <path class="ah" d="M190,344 L185.5,335 L194.5,335 Z"/>
  <path class="spine" d="M270,348 L270,320"/>
  <path class="ah" d="M270,320 L265.5,329 L274.5,329 Z"/>
  <text class="el" x="288" y="336">read, don’t recall</text>

  <!-- 3 -> 4 -> 5 -> 6 -->
  <path class="spine" d="M230,440 L230,468"/>
  <path class="ah" d="M230,468 L225.5,459 L234.5,459 Z"/>
  <path class="spine" d="M230,564 L230,592"/>
  <path class="ah" d="M230,592 L225.5,583 L234.5,583 Z"/>
  <path class="spine" d="M230,688 L230,716"/>
  <path class="ah" d="M230,716 L225.5,707 L234.5,707 Z"/>

  <!-- 6 -> flow-status : the sub-plan tree -->
  <path class="spine" d="M400,740 L458,740 L458,142 L516,142"/>
  <path class="ah" d="M516,142 L507,137.5 L507,146.5 Z"/>
  <text class="elc" x="450" y="450" transform="rotate(-90 450 450)">the sub-plan tree</text>

  <!-- flow-status -> 7 -->
  <path class="spine" d="M860,146 L956,146"/>
  <path class="ah" d="M956,146 L947,141.5 L947,150.5 Z"/>
  <text class="elc" x="908" y="138">the next runnable leaf</text>

  <!-- 7 -> 8 -->
  <path class="spine" d="M1130,192 L1130,406"/>
  <path class="ah" d="M1130,406 L1125.5,397 L1134.5,397 Z"/>
  <text class="el" x="1142" y="308">new code · EXEC_LOG</text>

  <!-- 8 -> 9 -->
  <path class="spine" d="M1130,502 L1130,716"/>
  <path class="ah" d="M1130,716 L1125.5,707 L1134.5,707 Z"/>
  <text class="el" x="1142" y="618">the run’s artifacts</text>

  <!-- 9 -> 10 -->
  <path class="spine" d="M960,766 L864,766"/>
  <path class="ah" d="M864,766 L873,761.5 L873,770.5 Z"/>
  <text class="elc" x="910" y="758">the verdict</text>

  <!-- 10 -> flow-status : close the leaf, ask for the next -->
  <path class="spine" d="M690,720 L690,196"/>
  <path class="ah" d="M690,196 L685.5,205 L694.5,205 Z"/>
  <text class="el" x="704" y="446">leaf closed —</text>
  <text class="el" x="704" y="462">ask for the next</text>

  <!-- 6 -> 11 -->
  <path class="spine" d="M230,812 L230,884"/>
  <path class="ah" d="M230,884 L225.5,875 L234.5,875 Z"/>
  <text class="el" x="244" y="852">the matured plan tree</text>

  <!-- ============ LOOP-BACK EDGES ============ -->

  <!-- 10 -> 6 re-decompose -->
  <path class="loop" d="M520,780 L404,780"/>
  <path class="ahv" d="M404,780 L413,775.5 L413,784.5 Z"/>
  <text class="lvc" x="462" y="772">re-decompose</text>

  <!-- 9 -> 7 finalize -->
  <path class="loop" d="M960,740 L900,740 L900,170 L956,170"/>
  <path class="ahv" d="M956,170 L947,165.5 L947,174.5 Z"/>
  <text class="lvc" x="892" y="470" transform="rotate(-90 892 470)">done-criterion met → finalize</text>

  <!-- 8 -> 7 feature gaps -->
  <path class="loop" d="M1300,440 L1312,440 L1312,144 L1304,144"/>
  <path class="ahv" d="M1304,144 L1313,139.5 L1313,148.5 Z"/>
  <text class="lvc" x="1305" y="310" transform="rotate(-90 1305 310)">feature gaps</text>

  <!-- 7 self-loop: the STOP line -->
  <path class="loop" d="M1070,100 C1070,58 1190,58 1190,96"/>
  <path class="ahv" d="M1190,96 L1185.5,87 L1194.5,87 Z"/>
  <text class="lvc" x="1130" y="52">STOP line — you run the command, then re-invoke</text>

  <!-- ============ JUMP STUBS ============ -->

  <!-- 10 -> 2 method pivot -->
  <path class="stub" d="M560,812 L560,838"/>
  <circle cx="560" cy="852" r="11" fill="#ffffff" stroke="#7048e8" stroke-width="1.5"/>
  <text class="jn" x="560" y="856">2</text>
  <text class="lv" x="578" y="856">method pivot</text>

  <!-- 10 -> 7 re-execute -->
  <path class="stub" d="M680,812 L680,838"/>
  <circle cx="680" cy="852" r="11" fill="#ffffff" stroke="#7048e8" stroke-width="1.5"/>
  <text class="jn" x="680" y="856">7</text>
  <text class="lv" x="698" y="856">re-execute</text>

  <!-- 8 -> 4 structural reorganization -->
  <path class="stub" d="M1040,502 L1040,528"/>
  <circle cx="1040" cy="542" r="11" fill="#ffffff" stroke="#7048e8" stroke-width="1.5"/>
  <text class="jn" x="1040" y="546">4</text>
  <text class="lv" x="1058" y="546">structural reorg</text>

  <!-- 7 -> 5 environment unusable -->
  <path class="stub" d="M1010,192 L1010,218"/>
  <circle cx="1010" cy="232" r="11" fill="#ffffff" stroke="#7048e8" stroke-width="1.5"/>
  <text class="jn" x="1010" y="236">5</text>
  <text class="lv" x="1028" y="236">env missing → rebuild</text>

  <!-- 11 -> 7 plan sync -->
  <path class="stub" d="M460,934 L486,934"/>
  <circle cx="499" cy="934" r="11" fill="#ffffff" stroke="#7048e8" stroke-width="1.5"/>
  <text class="jn" x="499" y="938">7</text>
  <text class="lv" x="517" y="938">missing detail → plan sync</text>

  <!-- ============ LEGEND ============ -->
  <rect x="880" y="824" width="420" height="156" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>

  <circle cx="906" cy="844" r="9" fill="#0ca678"/>
  <circle cx="906" cy="844" r="5" fill="#f8fafc"/>
  <circle cx="906" cy="844" r="2.4" fill="#0ca678"/>
  <text class="el" x="934" y="848">reads every stage · run it at any time</text>

  <path class="spine" d="M896,868 L924,868"/>
  <path class="ah" d="M924,868 L915,863.5 L915,872.5 Z"/>
  <text class="el" x="934" y="872">the usual order</text>

  <path class="loop" d="M896,892 L924,892"/>
  <path class="ahv" d="M924,892 L915,887.5 L915,896.5 Z"/>
  <text class="el" x="934" y="896">routes back / re-entry</text>

  <circle cx="906" cy="916" r="9" fill="#ffffff" stroke="#7048e8" stroke-width="1.5"/>
  <text class="jn" x="906" y="920" font-size="9.5">N</text>
  <text class="el" x="934" y="920">continues at skill N</text>

  <rect x="896" y="938" width="12" height="12" rx="3" fill="#4c6ef5"/>
  <text class="el" x="914" y="948">plans</text>
  <rect x="966" y="938" width="12" height="12" rx="3" fill="#f76707"/>
  <text class="el" x="984" y="948">code &amp; env</text>
  <rect x="1066" y="938" width="12" height="12" rx="3" fill="#0ca678"/>
  <text class="el" x="1084" y="948">reads &amp; reports</text>

  <circle cx="901" cy="969" r="6" fill="#0ca678"/>
  <circle cx="901" cy="969" r="3.4" fill="#f8fafc"/>
  <circle cx="901" cy="969" r="1.6" fill="#0ca678"/>
  <text class="elc" x="912" y="972" font-size="9.5" text-anchor="start">→ 7 → 9 is the light path per leaf. The full path adds 8 and 10.</text>
</svg>
